{% extends "base.html" %}
{% block title %}Add Student — ResultPro{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">

    <div class="d-flex align-items-center mb-4">
      <a href="{{ url_for('admin_dashboard') }}"
         class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="fw-bold mb-0">
        <i class="bi bi-person-plus-fill text-danger me-2"></i>Add New Student
      </h5>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4 p-md-5">
        <form method="POST">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-hash text-danger me-1"></i>Roll Number
              </label>
              <input type="text" name="roll_no"
                     class="form-control rounded-3"
                     placeholder="e.g. STU002" required/>
              <div class="form-text">Student login ke use avutundi</div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-person text-danger me-1"></i>Full Name
              </label>
              <input type="text" name="name"
                     class="form-control rounded-3"
                     placeholder="Student full name" required/>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-envelope text-danger me-1"></i>Email
              </label>
              <input type="email" name="email"
                     class="form-control rounded-3"
                     placeholder="student@email.com" required/>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-mortarboard text-danger me-1"></i>Class
              </label>
              <input type="text" name="class"
                     class="form-control rounded-3"
                     placeholder="e.g. 10th Grade" required/>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">
                <i class="bi bi-lock text-danger me-1"></i>Password
              </label>
              <input type="text" name="password"
                     class="form-control rounded-3"
                     placeholder="Set login password" required/>
              <div class="form-text">
                Student idi use chesi login chestadu
              </div>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit"
                    class="btn btn-danger btn-lg rounded-3 fw-semibold">
              <i class="bi bi-person-check me-2"></i>Add Student
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
