{% extends "base.html" %}
{% block title %}Add Result — ResultPro{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="d-flex align-items-center mb-4">
      <a href="{{ url_for('view_student', student_id=student['id']) }}"
         class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="fw-bold mb-0">
        <i class="bi bi-plus-circle-fill text-success me-2"></i>Add Result
      </h5>
    </div>

    <!-- Student Info Card -->
    <div class="card border-0 bg-success bg-opacity-10 rounded-4 mb-3 p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="rounded-circle bg-success d-flex align-items-center
                    justify-content-center text-white fw-bold"
             style="width:48px;height:48px;font-size:1.2rem;">
          {{ student['name'][0] }}
        </div>
        <div>
          <div class="fw-bold">{{ student['name'] }}</div>
          <small class="text-muted">
            {{ student['roll_no'] }} | {{ student['class'] }}
          </small>
        </div>
      </div>
    </div>

    <!-- Form -->
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-book text-success me-1"></i>Subject
            </label>
            <input type="text" name="subject"
                   class="form-control rounded-3"
                   placeholder="e.g. Mathematics" required/>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-pencil text-success me-1"></i>Marks Obtained
              </label>
              <input type="number" name="marks"
                     class="form-control rounded-3"
                     min="0" max="100"
                     placeholder="e.g. 85" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">
                <i class="bi bi-star text-success me-1"></i>Max Marks
              </label>
              <input type="number" name="max_marks"
                     class="form-control rounded-3"
                     value="100" min="1" required/>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-calendar-event text-success me-1"></i>Exam Type
            </label>
            <select name="exam_type" class="form-select rounded-3">
              <option value="Mid Term">Mid Term</option>
              <option value="Final Exam">Final Exam</option>
              <option value="Unit Test">Unit Test</option>
              <option value="Practice Test">Practice Test</option>
            </select>
          </div>

          <div class="d-grid">
            <button type="submit"
                    class="btn btn-success btn-lg rounded-3 fw-semibold">
              <i class="bi bi-check-circle me-2"></i>Save Result
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
